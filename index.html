<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volkana</title>
<meta name="description" content="Volkana - think in voltage. code in blood.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000000;
    color: #f5ead6;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
  }

  .container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: normal;
    letter-spacing: 0.15em;
    color: #c45d3a;
    margin-bottom: 0;
    line-height: 1;
  }

  .logo-sub {
    font-size: clamp(0.8rem, 2vw, 1rem);
    letter-spacing: 0.4em;
    color: #c45d3a;
    margin-top: 0.4rem;
    margin-bottom: 1.5rem;
    opacity: 0.8;
  }

  .tagline {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    font-style: italic;
    color: #a89878;
    margin-bottom: 3.5rem;
    letter-spacing: 0.05em;
  }

  .coming-soon {
    font-size: clamp(0.8rem, 2vw, 1rem);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: #f5ead6;
    margin-bottom: 2.5rem;
    opacity: 0.7;
  }

  .countdown {
    display: flex;
    gap: clamp(1rem, 4vw, 3rem);
    margin-bottom: 3rem;
  }

  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .time-value {
    font-size: clamp(2rem, 7vw, 4rem);
    font-weight: normal;
    color: #c45d3a;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .time-label {
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #a89878;
    margin-top: 0.5rem;
  }

  .footer {
    position: absolute;
    bottom: 1.5rem;
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    color: #5a5347;
    letter-spacing: 0.1em;
  }

  .footer a {
    color: #5a5347;
    text-decoration: none;
    border-bottom: 1px solid #3a3530;
    transition: color 0.3s;
  }

  .footer a:hover {
    color: #c45d3a;
  }

  .pulse {
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #c45d3a;
    margin: 0 auto 3rem;
    opacity: 0.6;
  }

  .inquiry {
    margin-bottom: 2rem;
    text-align: center;
  }

  .inquiry-text {
    display: block;
    font-size: 0.85rem;
    font-style: italic;
    color: #a89878;
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
  }

  .inquiry-link {
    font-size: 0.8rem;
    color: #c45d3a;
    text-decoration: none;
    border-bottom: 1px solid #5a3528;
    letter-spacing: 0.05em;
    transition: border-color 0.3s;
  }

  .inquiry-link:hover {
    border-bottom-color: #c45d3a;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">VOLKANA</div>
  <div class="logo-sub">DEV</div>
  <div class="tagline">think in voltage. code in blood.</div>
  <div class="divider"></div>
  <div class="coming-soon pulse">Coming Soon</div>
  <div class="countdown" id="countdown">
    <div class="time-unit">
      <div class="time-value" id="days">--</div>
      <div class="time-label">Days</div>
    </div>
    <div class="time-unit">
      <div class="time-value" id="hours">--</div>
      <div class="time-label">Hours</div>
    </div>
    <div class="time-unit">
      <div class="time-value" id="minutes">--</div>
      <div class="time-label">Minutes</div>
    </div>
    <div class="time-unit">
      <div class="time-value" id="seconds">--</div>
      <div class="time-label">Seconds</div>
    </div>
  </div>

  <div class="inquiry">
    <span class="inquiry-text">Strategic and investment inquiries</span>
    <a href="mailto:volkana@volkana.dev" class="inquiry-link">volkana@volkana.dev</a>
  </div>

  <div class="footer">
    <a href="https://github.com/VolkanaDEV">github.com/VolkanaDEV</a>
  </div>
</div>

<script>
  var target = new Date('2027-04-01T00:00:00').getTime();

  function updateCountdown() {
    var now = new Date().getTime();
    var distance = target - now;

    if (distance < 0) {
      document.getElementById('days').textContent = '0';
      document.getElementById('hours').textContent = '0';
      document.getElementById('minutes').textContent = '0';
      document.getElementById('seconds').textContent = '0';
      return;
    }

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = days;
    document.getElementById('hours').textContent = hours;
    document.getElementById('minutes').textContent = minutes;
    document.getElementById('seconds').textContent = seconds;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
